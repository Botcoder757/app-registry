name = "construct-app-registry"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "registry.construct.computer", custom_domain = true },
  # Per-app subdomains: each published app is served at
  # `${id}-${nanoid}.construct.computer`. Requires a wildcard DNS record
  # `*.construct.computer` (proxied) so unmatched first-level subdomains
  # reach this worker.
  { pattern = "*.construct.computer/*", zone_name = "construct.computer" },
]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "app-registry"
database_id = "9d832b01-d540-4564-a6e1-337fb199f4d2"
