name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "scripts/bundle-apps.sh"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      # The src/apps/*.ts files are gitignored — bundle every published app
      # at its pinned commit before deploying so the worker ships with the
      # current set of handlers, not the empty stub from `npm install`.
      - name: Bundle app handlers into worker
        run: bash scripts/bundle-apps.sh

      - name: Deploy
        working-directory: worker
        run: npx wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
