name: Sync Registry to D1

on:
  push:
    branches: [main]
    paths:
      - 'apps/*.json'
      - 'collections/*.json'
      - 'categories.json'
      - 'curated.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync app metadata to D1
        env:
          REGISTRY_SYNC_URL: ${{ secrets.REGISTRY_SYNC_URL }}
          REGISTRY_SYNC_SECRET: ${{ secrets.REGISTRY_SYNC_SECRET }}
        run: deno run --allow-read --allow-write --allow-net --allow-env --allow-run scripts/sync.ts

      - name: Bundle app handlers into worker
        run: bash scripts/bundle-apps.sh

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Deploy worker with bundled apps
        working-directory: worker
        run: npx wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Extract tool definitions from deployed apps
        env:
          REGISTRY_SYNC_URL: ${{ secrets.REGISTRY_SYNC_URL }}
          REGISTRY_SYNC_SECRET: ${{ secrets.REGISTRY_SYNC_SECRET }}
        run: |
          sleep 5
          bash scripts/extract-tools.sh
